<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F9F8F4;
  --forest:   #2D3A31;
  --sage:     #8C9A84;
  --clay:     #DCCFC2;
  --stone:    #E6E2DA;
  --terra:    #C27B66;
  --muted:    #F2F0EB;
  --dim:      #9AA89A;
  --card-bg:  #FFFFFF;
}

html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg); color: var(--forest);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh; padding-bottom: 124px;
}
body::after {
  content: ''; pointer-events: none;
  position: fixed; inset: 0; z-index: 99; opacity: 0.016;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
}
button { font-family: inherit; }
input, textarea { font-family: inherit; }

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 40;
  background: rgba(249,248,244,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--stone);
  display: flex; align-items: center;
  padding: 0 14px; height: 52px; gap: 10px;
}
.nav-logo {
  font-family: 'Noto Sans KR', sans-serif; font-size: 17px; font-weight: 700;
  color: var(--forest); letter-spacing: -0.02em; flex-shrink: 0;
}
.nav-logo span { color: var(--sage); }
.nav-spacer { flex: 1; }
.nav-search {
  display: flex; align-items: center; gap: 6px;
  background: var(--muted); border: 1.5px solid transparent;
  border-radius: 999px; padding: 6px 12px;
  width: 200px; max-width: 40vw; min-width: 80px;
  flex-shrink: 0; transition: all 0.2s;
}
.nav-search:focus-within { border-color: var(--sage); background: var(--card-bg); }
.nav-search svg { color: var(--dim); flex-shrink: 0; }
.nav-search input {
  flex: 1; border: none; background: transparent;
  font-size: 13px; color: var(--forest); outline: none; min-width: 0;
}
.nav-search input::placeholder { color: var(--clay); }
.search-clear {
  background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 13px; padding: 0 3px; line-height: 1; display: none;
}
.search-clear.show { display: inline; }
.nav-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.nav-btn {
  background: none; border: none;
  width: 36px; height: 36px; border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); cursor: pointer; transition: all 0.2s;
}
.nav-btn:hover { background: var(--muted); color: var(--forest); }
.nav-btn.fav-active { color: #E8A94A; background: rgba(255,211,110,0.15); }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 유로이 / 다로이 토글 */
.user-toggle {
  display: inline-flex;
  background: var(--muted); border: 1px solid var(--stone);
  border-radius: 999px; padding: 2px; flex-shrink: 0;
}
.utog {
  background: transparent; border: none;
  padding: 4px 11px; font-size: 12px; font-weight: 600;
  color: var(--dim); border-radius: 999px;
  cursor: pointer; transition: all 0.22s;
  letter-spacing: -0.02em; white-space: nowrap;
  min-height: 26px; display: inline-flex; align-items: center; gap: 3px;
}
.utog:hover:not(.active) { color: var(--sage); }
.utog.active {
  background: var(--card-bg); color: var(--forest);
  box-shadow: 0 1px 3px rgba(45,58,49,0.1); font-weight: 700;
}
@media (max-width: 560px) {
  .nav-logo { font-size: 15px; }
  .utog { padding: 4px 9px; font-size: 11px; }
  .nav-search { width: 140px; }
}
@media (max-width: 420px) {
  .nav { gap: 6px; padding: 0 10px; }
  .nav-logo { font-size: 14px; }
  .utog .utog-label { display: none; }
  .utog { padding: 4px 8px; }
  .nav-search { width: 110px; }
}

/* ── 카테고리 탭 바 ── */
.cat-bar {
  display: flex; align-items: center; gap: 0;
  overflow-x: auto; scrollbar-width: none;
  padding: 0 12px; border-bottom: 2px solid var(--stone);
}
.cat-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; font-size: 12px; font-weight: 500;
  padding: 11px 12px 9px;
  border: none; border-radius: 0;
  background: transparent; color: var(--dim);
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  letter-spacing: -0.01em;
}
.chip:hover { color: var(--sage); }
.chip.active {
  color: var(--forest); font-weight: 700;
  border-bottom-color: var(--terra);
}

/* ── 태그 바 ── */
.tag-bar {
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
  padding: 8px 20px;
  background: var(--muted); border-bottom: 1px solid var(--stone);
}
.tag-bar::-webkit-scrollbar { display: none; }
.tag-bar.hidden { display: none; }
.tag-chip {
  flex-shrink: 0; font-size: 11px; font-weight: 500;
  padding: 4px 11px; border-radius: 999px;
  border: 1px dashed var(--clay);
  background: var(--card-bg); color: var(--dim);
  cursor: pointer; white-space: nowrap; transition: all 0.2s; min-height: 26px;
}
.tag-chip.common { border-style: solid; }
.tag-chip:hover { border-color: var(--terra); color: var(--terra); }
.tag-chip.active { background: var(--terra); border-color: var(--terra); color: #fff; }

/* ── 리스트 ── */
.list-wrap { max-width: 680px; margin: 0 auto; padding: 16px 16px 0; }
.date-group-label {
  font-size: 11px; font-weight: 600;
  color: var(--dim); letter-spacing: 0.06em;
  text-transform: uppercase; padding: 14px 4px 6px;
}
.list-empty {
  text-align: center; padding: 60px 20px;
  color: var(--dim); font-size: 14px; line-height: 1.7;
}

.link-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--card-bg); border: 1px solid var(--stone);
  border-radius: 14px; padding: 12px 14px;
  margin-bottom: 6px; cursor: pointer;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1),
              box-shadow 0.35s cubic-bezier(0.16,1,0.3,1);
  position: relative; overflow: hidden;
}
.link-row::before {
  content: ''; position: absolute; left: 0; top: 10%; bottom: 10%;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--accent, var(--clay));
  opacity: 0; transition: opacity 0.2s;
}
.link-row:hover { transform: translateY(-2px); box-shadow: 0 8px 24px -6px rgba(45,58,49,0.12); }
.link-row:hover::before { opacity: 1; }

.topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--accent, var(--clay)); }
.link-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.link-title {
  font-size: 14px; font-weight: 600; color: var(--forest);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.4;
}
.link-bottom { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); }
.link-cat-badge {
  font-size: 10px; font-weight: 600; color: var(--sage);
  background: rgba(140,154,132,0.12);
  padding: 1px 7px; border-radius: 999px; flex-shrink: 0;
}
.link-sep { color: var(--clay); }
.link-tag-mini {
  font-size: 10px; color: var(--terra);
  background: rgba(194,123,102,0.08);
  padding: 1px 6px; border-radius: 999px;
}
.link-domain {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 120px;
}
.link-icons { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.link-icons .icon-btn {
  background: none; border: none;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--clay); transition: all 0.2s;
}
.link-icons .icon-btn:hover { background: var(--muted); color: var(--terra); }
.link-icons .icon-btn.fav-on { color: #E8A94A; }

/* ── 하단 채팅 바 ── */
.chat-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: rgba(249,248,244,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--stone);
  padding: 8px 16px calc(10px + env(safe-area-inset-bottom));
}
.chat-topics {
  display: flex; align-items: center; gap: 5px;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 7px;
}
.chat-topics::-webkit-scrollbar { display: none; }
.chat-topic {
  flex-shrink: 0; font-size: 11px; font-weight: 500;
  padding: 4px 11px; border-radius: 999px;
  border: 1.5px solid var(--stone);
  background: transparent; color: var(--dim);
  cursor: pointer; white-space: nowrap;
  transition: all 0.18s; min-height: 26px;
}
.chat-topic:hover { border-color: var(--sage); color: var(--sage); }
.chat-topic.selected { background: var(--sage); border-color: var(--sage); color: #fff; }
.chat-topic.auto { font-style: italic; }
.chat-topic.auto.selected { background: var(--dim); border-color: var(--dim); }

.chat-tags {
  display: flex; align-items: center; gap: 5px;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 7px;
}
.chat-tags::-webkit-scrollbar { display: none; }
.chat-tag {
  flex-shrink: 0; font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 999px;
  border: 1.5px solid rgba(194,123,102,0.3);
  background: transparent; color: var(--terra);
  cursor: pointer; white-space: nowrap;
  transition: all 0.18s; min-height: 26px;
}
.chat-tag:hover { border-color: var(--terra); }
.chat-tag.selected { background: var(--terra); border-color: var(--terra); color: #fff; }

.quick-tag-chip {
  font-size: 13px; font-weight: 500;
  padding: 8px 14px; border-radius: 999px;
  border: 1.5px solid rgba(194,123,102,0.3);
  background: transparent; color: var(--terra);
  cursor: pointer; white-space: nowrap;
  transition: all 0.18s;
}
.quick-tag-chip:hover { border-color: var(--terra); }
.quick-tag-chip.selected { background: var(--terra); border-color: var(--terra); color: #fff; }

.chat-input-row { display: flex; align-items: center; gap: 8px; overflow: hidden; }
.chat-input-wrap {
  flex: 1; min-width: 0; display: flex; align-items: center;
  background: var(--card-bg); border: 1.5px solid var(--stone);
  border-radius: 22px; padding: 9px 12px; gap: 6px;
  transition: all 0.2s;
  box-shadow: 0 2px 12px -4px rgba(45,58,49,0.08);
}
.chat-input-wrap:focus-within { border-color: var(--sage); box-shadow: 0 4px 16px -4px rgba(140,154,132,0.18); }
.chat-input-wrap input {
  flex: 1; border: none; background: transparent;
  font-size: 14px; color: var(--forest); outline: none; min-width: 0;
}
.chat-input-wrap input::placeholder { color: var(--clay); }
.chat-send-btn, .chat-new-btn {
  background: var(--forest); color: #fff; border: none;
  border-radius: 999px; width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.25s, transform 0.2s;
  box-shadow: 0 2px 10px -2px rgba(45,58,49,0.25);
}
.chat-new-btn { background: var(--terra); }
.chat-send-btn:hover { background: var(--terra); transform: scale(1.05); }
.chat-new-btn:hover { background: var(--forest); transform: scale(1.05); }
.chat-send-btn svg, .chat-new-btn svg { width: 18px; height: 18px; }

/* + 메뉴 팝업 */
.add-menu {
  position: fixed; bottom: 108px; right: 66px;
  background: var(--card-bg); border: 1px solid var(--stone);
  border-radius: 14px; padding: 5px;
  min-width: 190px;
  box-shadow: 0 12px 30px -4px rgba(45,58,49,0.22);
  z-index: 45;
  opacity: 0; pointer-events: none;
  transform: translateY(6px) scale(0.96);
  transition: opacity 0.2s, transform 0.2s;
}
.add-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
.add-menu button {
  display: flex; align-items: center; gap: 11px;
  width: 100%; text-align: left;
  background: none; border: none;
  padding: 10px 12px; border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--forest); cursor: pointer; transition: background 0.15s;
  letter-spacing: -0.01em;
}
.add-menu button:hover { background: var(--muted); }
.add-menu-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.chat-new-btn.open { background: var(--forest); }
.chat-new-btn.open #addBtnIcon { transform: rotate(45deg); }

/* ── 시트 (오버레이) ── */
.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(45,58,49,0.42);
  backdrop-filter: blur(6px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.28s;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.sheet {
  background: var(--bg); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 600px; margin: 0 auto;
  padding: 22px 22px 36px;
  box-shadow: 0 -16px 48px -8px rgba(45,58,49,0.14);
  max-height: 88vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.16,1,0.3,1);
}
.overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; border-radius: 999px; background: var(--clay); margin: 0 auto 18px; }
.sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.sheet-close {
  width: 100%; margin-top: 18px;
  background: var(--muted); border: none;
  border-radius: 999px; padding: 13px;
  font-size: 14px; font-weight: 600; color: var(--dim);
  cursor: pointer; transition: all 0.2s; min-height: 48px;
}
.sheet-close:hover { background: var(--stone); color: var(--forest); }

/* 카테고리 관리 */
.cat-edit-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.cat-edit-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--card-bg); border: 1px solid var(--stone);
  border-radius: 12px; padding: 12px 14px;
  cursor: grab;
}
.cat-edit-row:active { cursor: grabbing; }
.cat-edit-row.dragging { opacity: 0.4; }
.cat-edit-row.drag-over { outline: 2px dashed var(--sage); outline-offset: 2px; }
.cat-edit-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-edit-name {
  flex: 1; font-size: 14px; font-weight: 500; color: var(--forest);
  border: none; background: transparent; outline: none;
}
.cat-edit-name:focus { background: var(--muted); padding: 4px 8px; border-radius: 6px; }
.cat-edit-count { font-size: 12px; color: var(--dim); white-space: nowrap; flex-shrink: 0; }
.cat-edit-del, .cat-edit-tags {
  background: none; border: none; cursor: pointer;
  font-size: 13px; padding: 4px 6px;
  color: var(--clay); transition: color 0.2s;
  white-space: nowrap; flex-shrink: 0;
}
.cat-edit-del:hover { color: var(--terra); }
.cat-edit-tags:hover { color: var(--sage); }
.cat-add-row { display: flex; gap: 8px; }
.cat-add-input, .tag-add-input {
  flex: 1; background: var(--muted); border: 1.5px solid transparent;
  border-radius: 12px; padding: 11px 14px;
  font-size: 14px; color: var(--forest); outline: none; transition: border-color 0.2s;
}
.cat-add-input:focus, .tag-add-input:focus { border-color: var(--sage); background: #fff; }
.cat-add-btn, .tag-add-btn {
  background: var(--forest); color: #fff; border: none;
  border-radius: 12px; padding: 11px 20px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
  white-space: nowrap;
}
.cat-add-btn:hover, .tag-add-btn:hover { background: var(--terra); }

/* 태그 관리 */
.tag-scope-tabs {
  display: flex; background: var(--muted);
  border-radius: 12px; padding: 4px; margin-bottom: 14px;
}
.tag-scope-tab {
  flex: 1; background: transparent; border: none;
  padding: 9px 10px; border-radius: 9px;
  font-size: 13px; font-weight: 600; color: var(--dim);
  cursor: pointer; transition: all 0.2s;
}
.tag-scope-tab.active { background: var(--card-bg); color: var(--forest); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.tag-scope-hint { font-size: 12px; color: var(--dim); padding: 0 4px 10px; line-height: 1.5; }
.tag-scope-hint strong { color: var(--sage); }
.tag-edit-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 40px; }
.tag-edit-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px 6px 12px; border-radius: 999px;
  background: var(--card-bg); border: 1px dashed var(--clay);
  font-size: 12px; font-weight: 500; color: var(--forest);
}
.tag-edit-chip.common { border-style: solid; }
.tag-edit-chip-del {
  background: none; border: none; cursor: pointer;
  color: var(--clay); font-size: 12px; padding: 0 2px; line-height: 1;
}
.tag-edit-chip-del:hover { color: var(--terra); }
.tag-edit-chip[draggable="true"] { cursor: grab; }
.tag-edit-chip[draggable="true"]:active { cursor: grabbing; }
.tag-edit-chip.dragging { opacity: 0.4; }
.tag-edit-chip.drag-over { outline: 2px dashed var(--sage); outline-offset: 2px; }
.tag-empty { font-size: 12px; color: var(--dim); font-style: italic; padding: 8px 0; }

/* 폼 필드 (시트) */
.field-group { margin-bottom: 14px; }
.field-label {
  font-size: 11px; font-weight: 600; color: var(--dim);
  letter-spacing: 0.05em; text-transform: uppercase;
  padding-bottom: 6px; display: block;
}
.field-input, .field-textarea {
  width: 100%; background: var(--muted); border: 1.5px solid transparent;
  border-radius: 12px; padding: 11px 14px;
  font-size: 14px; color: var(--forest); outline: none; transition: all 0.2s;
}
.field-input:focus, .field-textarea:focus { border-color: var(--sage); background: #fff; }
.field-textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

.cat-selector, .tag-selector { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-pick, .tag-pick {
  padding: 5px 12px; border-radius: 999px;
  border: 1.5px solid var(--stone);
  background: var(--card-bg); color: var(--dim);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.cat-pick.picked { background: var(--forest); color: #fff; border-color: var(--forest); }
.tag-pick { font-size: 11px; padding: 4px 10px; border-style: dashed; }
.tag-pick.common { border-style: solid; }
.tag-pick.picked { background: var(--terra); color: #fff; border-color: var(--terra); }
.tag-pick-section-label {
  width: 100%; font-size: 10px; color: var(--dim);
  padding: 6px 0 2px; font-weight: 600; letter-spacing: 0.05em;
  text-transform: uppercase;
}

.sheet-actions { display: flex; gap: 10px; margin-top: 6px; }
.sheet-btn {
  flex: 1; border: none; border-radius: 12px;
  padding: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; min-height: 48px;
}
.sheet-btn.primary { background: var(--forest); color: #fff; }
.sheet-btn.primary:hover { background: var(--terra); }
.sheet-btn.secondary { background: var(--muted); color: var(--dim); }
.sheet-btn.secondary:hover { background: var(--stone); color: var(--forest); }

/* ══ 리더 (iframe 기반) ══ */
.reader {
  position: fixed; inset: 0; z-index: 60;
  background: var(--bg);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.16,1,0.3,1);
}
.reader.open { transform: translateX(0); }
.reader-nav {

}

}

}

}
.reader-title:focus { background: var(--muted); padding: 4px 8px; border-radius: 8px; }
.reader-meta {

}

}

/* 노트 카드 (하단 고정, collapsed by default) */
.note-card {
  flex-shrink: 0;
  background: var(--card-bg);
  border-top: 1px solid var(--stone);

  max-height: 70vh; overflow-y: auto;
}

.note-textarea {

}

}
.preview-card-inner {

}

}
.preview-favicon img {

}
.preview-info { flex: 1; min-width: 0; }
.preview-source {

}
.preview-title {

  font-size: 15px; font-weight: 700;

  line-height: 1.35;
  margin-bottom: 5px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  letter-spacing: -0.01em;
}
.preview-url {
  font-size: 11px; color: var(--dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-weight: 500;
}
.preview-arrow {
  flex-shrink: 0;
  color: var(--clay);
  transition: color 0.2s, transform 0.22s;
  display: flex; align-items: center;
}
.preview-card:hover .preview-arrow {
  color: var(--terra);
  transform: translate(3px, -3px);
}
.preview-hint {
  text-align: center; font-size: 11px;
  color: var(--dim); font-style: italic;
  margin-top: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: -0.01em;
}
@media (max-width: 480px) {

  .preview-title { font-size: 14px; }

/* mywork (URL 없는 글) 본문 */
.mywork-content {

}
.mywork-content:empty::before {

}
.mywork-content[contenteditable="true"]:focus { outline: 2px dashed var(--clay); outline-offset: 6px; border-radius: 4px; }
.mywork-content p { margin-bottom: 12px; }

.hidden { display: none !important; }

/* 토스트 */
.toast {
  position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
  background: var(--forest); color: #fff;
  padding: 10px 16px; border-radius: 999px;
  font-size: 13px; font-weight: 500;
  z-index: 90; opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

/* 툴팁 */
[data-tip] { position: relative; }
[data-tip]::after {
  content: attr(data-tip);
  position: absolute; top: calc(100% + 6px); left: 50%;
  transform: translateX(-50%) translateY(-3px);
  background: var(--forest); color: #fff;
  font-size: 11px; font-weight: 500;
  padding: 4px 9px; border-radius: 7px;
  white-space: nowrap; letter-spacing: -0.01em;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s, transform 0.18s;
  z-index: 100;
  box-shadow: 0 4px 12px -2px rgba(45,58,49,0.25);
}
[data-tip]:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }
.chat-bar [data-tip]::after { top: auto; bottom: calc(100% + 6px); transform: translateX(-50%) translateY(3px); }
.chat-bar [data-tip]:hover::after { transform: translateX(-50%) translateY(0); }
@media (hover: none) { [data-tip]::after { display: none; } }

@media (max-width: 480px) {
  .nav { padding: 0 12px; }
  .list-wrap { padding: 12px 12px 0; }
  .chat-bar { padding-left: 12px; padding-right: 12px; }
  .reader-header { padding: 14px 16px 0; }
  .reader-title { font-size: 19px; }
}
</style>

            <div class="preview-favicon">
              <img id="previewFavicon" src="" alt="" onerror="this.style.opacity='0.25'" />
            </div>
            <div class="preview-info">
              <div class="preview-source" id="previewSource"></div>
              <div class="preview-title" id="previewTitle"></div>
              <div class="preview-url" id="previewUrl"></div>
            </div>
            <div class="preview-arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
            </div>
          </div>
        </a>
        <div class="preview-hint">눌러서 새 탭에서 열어보세요</div>
      </div>
      <!-- mywork (URL 없는 글) -->
      <div class="mywork-content hidden" id="myworkContent" contenteditable="true" spellcheck="false" data-placeholder="여기에 글을 써보세요..."></div>
    </div>

    <!-- 노트 (하단 고정) -->
    <div class="note-card" id="noteCard">
      <div class="note-header" onclick="toggleNote()">
        <div class="note-header-left">
          <span>📓</span><span>노트</span>
          <span style="font-size:11px; color:var(--dim); font-weight:400;" id="noteImgCount"></span>
        </div>
        <svg class="note-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="note-body">
        <textarea class="note-textarea" id="noteText" placeholder="이 링크에 대한 한 줄 메모, 인사이트..."></textarea>
        <div class="note-images" id="noteImages"></div>
        <label class="note-upload">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          이미지
          <input type="file" accept="image/*" multiple style="display:none" onchange="handleNoteImage(event)" />
        </label>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_PREFIX = 'archive_app_v2_';
const USER_KEY       = 'archive_app_active_user';

(function migrate(){
  // 샘플 데이터 완전 정리 (최초 1회만 실행)
  const CLEAN_FLAG = 'archive_cleaned_v1';
  if (!localStorage.getItem(CLEAN_FLAG)) {
    localStorage.removeItem(STORAGE_PREFIX + 'yuroi');
    localStorage.removeItem(STORAGE_PREFIX + 'daroi');
    localStorage.removeItem('archive_app_v1');
    localStorage.setItem(CLEAN_FLAG, '1');
  }
})();

const DEFAULT_CATEGORIES = [
  { id: 'c_mylab',   name: '내 작업실',    color: '#D4A574', builtin: true },
  { id: 'c_insta',   name: '인스타그램',   color: '#E8A5A5', builtin: true },
  { id: 'c_plan',    name: '기획',         color: '#A5D4AC', builtin: true },
  { id: 'c_content', name: '컨텐츠 제작',  color: '#E8CFA5', builtin: true },
  { id: 'c_notion',  name: '노션',         color: '#B8B8B8', builtin: true },
  { id: 'c_ai',      name: 'AI',           color: '#C4A5E8', builtin: true },
  { id: 'c_git',     name: 'github',       color: '#6B7A64', builtin: true },
  { id: 'c_site',    name: '사이트',       color: '#A5B4E8', builtin: true },
  { id: 'c_etc',     name: '기타',         color: '#D0D0D0', builtin: true, isFallback: true },
];
const DAROI_CATEGORIES = [
  { id: 'c_money', name: '재테크', color: '#A5D4AC', builtin: true },
  { id: 'c_etc',   name: '기타',   color: '#D0D0D0', builtin: true, isFallback: true },
];
const AUTO_KEYWORDS = {
  c_insta:   ['instagram','insta','reel','reels','릴스','인스타','threads'],
  c_plan:    ['plan','planning','기획','전략','strategy'],
  c_content: ['content','블로그','blog','tistory','brunch','velog','post'],
  c_notion:  ['notion.so','notion.site','노션'],
  c_ai:      ['chatgpt','claude','openai','anthropic','gpt','gemini','midjourney','runway'],
  c_git:     ['github.com','gitlab','git.','code'],
  c_site:    ['figma','framer','webflow','vercel','netlify','canva','dribbble'],
};

let ACTIVE_USER = localStorage.getItem(USER_KEY) || 'yuroi';
let STATE = loadUserState(ACTIVE_USER);
migrateFilter(STATE);

function migrateFilter(state) {
  state.filter = Object.assign({ categoryId:'all', tagId:null, favoriteOnly:false, search:'' }, state.filter || {});
  if (typeof state.filter.favoriteOnly !== 'boolean') state.filter.favoriteOnly = false;
  if (typeof state.filter.search !== 'string') state.filter.search = '';
  state.ui = state.ui || { chatCat: 'auto', chatTags: [], tagScope: 'common', tagScopeCat: null };
}

function makeDefaultState(user) {
  if (user === 'daroi') {
    return {
      categories: DAROI_CATEGORIES.slice(),
      tags: [], links: [],
      filter: { categoryId:'all', tagId:null, favoriteOnly:false, search:'' },
      currentLinkId: null,
      ui: { chatCat: 'auto', chatTags: [], tagScope: 'common', tagScopeCat: null }
    };
  }
  // 유로이 기본값 — 태그 샘플은 유지, 링크는 비움
  return {
    categories: DEFAULT_CATEGORIES.slice(),
    tags: [
      { id: 't_ref',   name: '레퍼런스',   scope: 'common', categoryId: null },
      { id: 't_insp',  name: '영감',       scope: 'common', categoryId: null },
      { id: 't_impt',  name: '중요',       scope: 'common', categoryId: null },
      { id: 't_reels', name: '릴스',       scope: 'category', categoryId: 'c_insta' },
      { id: 't_feed',  name: '피드디자인', scope: 'category', categoryId: 'c_insta' },
      { id: 't_tmpl',  name: '템플릿',     scope: 'category', categoryId: 'c_notion' },
    ],
    links: [],
    filter: { categoryId:'all', tagId:null, favoriteOnly:false, search:'' },
    currentLinkId: null,
    ui: { chatCat: 'auto', chatTags: [], tagScope: 'common', tagScopeCat: null }
  };
}
function loadUserState(user) {
  try { const raw = localStorage.getItem(STORAGE_PREFIX + user); if (raw) return JSON.parse(raw); } catch (e) {}
  return makeDefaultState(user);
}
function saveState() {
  try { localStorage.setItem(STORAGE_PREFIX + ACTIVE_USER, JSON.stringify(STATE)); } catch (e) {}
  syncToCloud();
}

// ═══ Supabase 동기화 ═══
const SYNC = window.__ARCHIVE_SYNC__ || {};
let _supabaseClient = null;
function getSupabase() {
  if (!SYNC.url || !SYNC.key) return null;
  if (!_supabaseClient && window.supabase) {
    _supabaseClient = window.supabase.createClient(SYNC.url, SYNC.key);
  }
  return _supabaseClient;
}

let _syncTimer = null;
function syncToCloud() {
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async () => {
    const sb = getSupabase();
    if (!sb) return;
    try {
      const now = new Date().toISOString();
      await sb.from(SYNC.table || 'archive_profiles').upsert({
        id: ACTIVE_USER,
        data: STATE,
        updated_at: now
      });
      localStorage.setItem('archive_last_sync_' + ACTIVE_USER, new Date(now).getTime().toString());
      console.log('☁️ 클라우드 저장 완료');
    } catch (e) { console.log('sync error', e); }
  }, 1500);
}

async function syncFromCloud() {
  const sb = getSupabase();
  if (!sb) { showToast('⚠️ 동기화 설정 없음'); return; }
  const btn = $('#syncBtn');
  if (btn) btn.style.animation = 'spin 1s linear infinite';
  try {
    const { data, error } = await sb.from(SYNC.table || 'archive_profiles').select('data, updated_at').eq('id', ACTIVE_USER).single();
    if (error) throw error;
    if (data?.data) {
      const cloud = data.data;
      let added = { cats: 0, tags: 0, links: 0 };
      // 카테고리 병합 (없는 것만 추가)
      (cloud.categories || []).forEach(c => {
        if (!STATE.categories.find(x => x.id === c.id)) { STATE.categories.push(c); added.cats++; }
      });
      // 태그 병합
      (cloud.tags || []).forEach(t => {
        if (!STATE.tags.find(x => x.id === t.id)) { STATE.tags.push(t); added.tags++; }
      });
      // 링크 병합
      (cloud.links || []).forEach(l => {
        if (!STATE.links.find(x => x.id === l.id)) { STATE.links.push(l); added.links++; }
      });
      saveState();
      renderCatBar(); renderTagBar(); renderChatTopics(); renderChatTags(); renderList(); renderFavToggle();
      showToast(`☁️ +${added.cats}카테고리, +${added.tags}태그, +${added.links}링크`);
    } else {
      showToast('☁️ 클라우드 데이터 없음');
    }
  } catch (e) {
    console.log('sync error', e);
    showToast('⚠️ 동기화 실패');
  }
  if (btn) btn.style.animation = '';
}

function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-3); }
function safeHostname(url) { try { return new URL(url.startsWith('http') ? url : 'https://'+url).hostname.replace(/^www\./,''); } catch { return url; } }

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function findCat(id) { return STATE.categories.find(c => c.id === id); }
function findTag(id) { return STATE.tags.find(t => t.id === id); }
function findLink(id) { return STATE.links.find(l => l.id === id); }
function fallbackCatId() { const fb = STATE.categories.find(c => c.isFallback); return fb ? fb.id : STATE.categories[STATE.categories.length-1].id; }
function relativeDateLabel(ts) {
  const now = new Date(); const d = new Date(ts);
  const diffDays = Math.floor((now.setHours(0,0,0,0) - new Date(ts).setHours(0,0,0,0)) / 86400000);
  if (diffDays === 0) return '오늘';
  if (diffDays === 1) return '어제';
  if (diffDays < 7) return diffDays + '일 전';
  if (diffDays < 30) return Math.floor(diffDays/7) + '주 전';
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function autoClassify(url) {
  const lower = url.toLowerCase();
  for (const [catId, kws] of Object.entries(AUTO_KEYWORDS)) {
    if (kws.some(k => lower.includes(k))) return catId;
  }
  return fallbackCatId();
}
function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 700);
}

/* ── 사용자 전환 ── */
function switchUser(u) {
  if (u === ACTIVE_USER) return;
  saveState();
  if ($('#reader').classList.contains('open')) closeReaderForce();
  ['catManagePanel','tagManagePanel','linkEditPanel','newWorkPanel','quickSavePanel'].forEach(id => {
    const el = document.getElementById(id); if (el) el.classList.remove('open');
  });
  closeAddMenu();
  ACTIVE_USER = u;
  try { localStorage.setItem(USER_KEY, u); } catch(e){}
  STATE = loadUserState(u);
  migrateFilter(STATE);
  const si = $('#searchInput');
  if (si) { si.value = STATE.filter.search || ''; $('#searchClear').classList.toggle('show', !!si.value); }
  renderUserTabs();
  renderAll();
  showToast((u === 'yuroi' ? '👩 유로이' : '👨 다로이') + ' 아카이브');
}
function renderUserTabs() {
  $$('#userToggle .utog').forEach(t => t.classList.toggle('active', t.dataset.user === ACTIVE_USER));
}

/* ── 즐겨찾기 ── */
function toggleFavFilter() {
  STATE.filter.favoriteOnly = !STATE.filter.favoriteOnly;
  saveState(); renderFavToggle(); renderList();
}
function renderFavToggle() {
  const btn = $('#favToggle'); if (!btn) return;
  btn.classList.toggle('fav-active', !!STATE.filter.favoriteOnly);
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', STATE.filter.favoriteOnly ? 'currentColor' : 'none');
}

/* ── 검색 ── */
function handleSearchInput(e) {
  STATE.filter.search = e.target.value;
  $('#searchClear').classList.toggle('show', !!e.target.value);
  if (handleSearchInput._t) clearTimeout(handleSearchInput._t);
  handleSearchInput._t = setTimeout(() => { saveState(); renderList(); }, 120);
}
function clearSearch() {
  STATE.filter.search = '';
  $('#searchInput').value = '';
  $('#searchClear').classList.remove('show');
  saveState(); renderList();
}

/* ── 카테고리 & 태그 필터 ── */
function setCatFilter(id) {
  STATE.filter.categoryId = id; STATE.filter.tagId = null;
  saveState(); renderCatBar(); renderTagBar(); renderList();
}
function setTagFilter(id) { STATE.filter.tagId = id; saveState(); renderTagBar(); renderList(); }

function renderCatBar() {
  const bar = $('#catBar'); const f = STATE.filter.categoryId;
  let html = `<button class="chip ${f==='all'?'active':''}" onclick="setCatFilter('all')">전체</button>`;
  STATE.categories.forEach(c => {
    html += `<button class="chip ${f===c.id?'active':''}" onclick="setCatFilter('${c.id}')">${escapeHtml(c.name)}</button>`;
  });
  bar.innerHTML = html;
}
function renderTagBar() {
  const bar = $('#tagBar'); const catId = STATE.filter.categoryId;
  let relevantTags = catId === 'all'
    ? STATE.tags.filter(t => t.scope === 'common')
    : STATE.tags.filter(t => t.scope === 'common' || t.categoryId === catId);
  if (relevantTags.length === 0) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  const f = STATE.filter.tagId;
  let html = `<button class="tag-chip ${!f?'active':''}" onclick="setTagFilter(null)">#전체</button>`;
  relevantTags.forEach(t => {
    html += `<button class="tag-chip ${t.scope==='common'?'common':''} ${f===t.id?'active':''}" onclick="setTagFilter('${t.id}')">#${escapeHtml(t.name)}</button>`;
  });
  bar.innerHTML = html;
}

/* ── 리스트 렌더 ── */
function filterLinks() {
  const f = STATE.filter;
  const q = (f.search || '').trim().toLowerCase();
  return STATE.links.filter(l => {
    if (f.categoryId !== 'all' && l.categoryId !== f.categoryId) return false;
    if (f.tagId && !l.tagIds.includes(f.tagId)) return false;
    if (f.favoriteOnly && !l.isFavorite) return false;
    if (q) {
      const hay = [l.title, l.url, l.domain, l.note?.text, l.content].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => b.createdAt - a.createdAt);
}
function renderList() {
  const wrap = $('#listWrap'); const links = filterLinks();
  if (links.length === 0) {
    const userName = ACTIVE_USER === 'yuroi' ? '유로이' : '다로이';
    wrap.innerHTML = `<div class="list-empty">${userName}의 아카이브가 비어있어요<br/><br/>아래 입력창에 URL이나 메모를 남겨보세요<br/>+ 버튼으로 카테고리·태그도 만들 수 있어요</div>`;
    return;
  }
  let lastLabel = null; let html = '';
  links.forEach(link => {
    const label = relativeDateLabel(link.createdAt);
    if (label !== lastLabel) { html += `<div class="date-group-label">${label}</div>`; lastLabel = label; }
    const cat = findCat(link.categoryId);
    const accent = cat ? cat.color : 'var(--clay)';
    const catName = cat ? cat.name : '알 수 없음';
    const tagHtml = link.tagIds.slice(0,2).map(tid => { const t = findTag(tid); return t ? `<span class="link-tag-mini">#${escapeHtml(t.name)}</span>` : ''; }).join('');
    const moreTags = link.tagIds.length > 2 ? `<span class="link-tag-mini">+${link.tagIds.length-2}</span>` : '';
    html += `
      <div class="link-row" style="--accent:${accent}" data-id="${link.id}" onclick="openReader('${link.id}')">
        <div class="topic-dot"></div>
        <div class="link-main">
          <div class="link-title">${escapeHtml(link.title)}</div>
          <div class="link-bottom">
            <span class="link-cat-badge">${escapeHtml(catName)}</span>
            ${tagHtml ? `<span class="link-sep">·</span>${tagHtml}${moreTags}`:''}
            ${link.itemType === 'mywork' ? '<span class="link-sep">·</span><span style="color:var(--terra);font-weight:600;">✍️ 내 글</span>' : `<span class="link-sep">·</span><span class="link-domain">${escapeHtml(link.domain || '')}</span>`}
          </div>
        </div>
        <div class="link-icons" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="openQuickTagEdit('${link.id}')" title="태그 편집">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5"/></svg>
          </button>
          <button class="icon-btn ${link.isFavorite?'fav-on':''}" onclick="toggleFav('${link.id}')" title="즐겨찾기">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="${link.isFavorite?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
        </div>
      </div>`;
  });
  wrap.innerHTML = html;
}

/* ── 하단 카테고리 토글 ── */
function renderChatTopics() {
  const cur = STATE.ui.chatCat;
  let html = `<button class="chat-topic auto ${cur==='auto'?'selected':''}" onclick="setChatCat('auto')">자동 분류</button>`;
  STATE.categories.forEach(c => {
    html += `<button class="chat-topic ${cur===c.id?'selected':''}" onclick="setChatCat('${c.id}')">${escapeHtml(c.name)}</button>`;
  });
  $('#chatTopics').innerHTML = html;
}
function setChatCat(id) {
  STATE.ui.chatCat = id;
  STATE.ui.chatTags = []; // 카테고리 변경 시 태그 초기화
  saveState(); renderChatTopics(); renderChatTags();
}

/* ── 하단 태그 토글 ── */
function renderChatTags() {
  const wrap = $('#chatTags');
  // 자동 분류 시 태그 숨김
  if (STATE.ui.chatCat === 'auto') {
    wrap.innerHTML = '';
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'flex';
  const selected = STATE.ui.chatTags || [];
  // 현재 카테고리의 태그만 표시
  const catTags = STATE.tags.filter(t => t.categoryId === STATE.ui.chatCat);
  if (catTags.length === 0) {
    wrap.innerHTML = '<span style="font-size:11px;color:var(--dim);padding:4px;">태그 없음</span>';
    return;
  }
  let html = '';
  catTags.forEach(t => {
    const isOn = selected.includes(t.id);
    html += `<button class="chat-tag ${isOn?'selected':''}" onclick="toggleChatTag('${t.id}')">#${escapeHtml(t.name)}</button>`;
  });
  wrap.innerHTML = html;
}
function toggleChatTag(tagId) {
  if (!STATE.ui.chatTags) STATE.ui.chatTags = [];
  const idx = STATE.ui.chatTags.indexOf(tagId);
  if (idx >= 0) STATE.ui.chatTags.splice(idx, 1);
  else STATE.ui.chatTags.push(tagId);
  renderChatTags();
}

/* ── URL/메모 판별 + 저장 ── */
function looksLikeUrl(s) {
  if (!s) return false;
  if (/^https?:\/\//i.test(s)) return true;
  if (/^\S+\.[a-z]{2,}(\/|$|\?|#)/i.test(s) && !/\s/.test(s)) return true;
  return false;
}
let _quickSaveLinkId = null;
let _quickSaveBlocked = false;

/* ── 링크 메타(제목) 자동 가져오기 (Microlink 무료 API) ── */
// TODO: 노션 링크 제목 가져오기 개선 필요 (현재 CORS로 실패)
// - 옵션1: jsonlink.io API 시도
// - 옵션2: Cloudflare Workers 프록시 구축
async function fetchLinkMeta(url) {
  try {
    const api = `https://api.microlink.io/?url=${encodeURIComponent(url)}`;
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), 5000);
    const res = await fetch(api, { signal: controller.signal });
    clearTimeout(t);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.status === 'success' && data.data) {
      return { title: data.data.title || null, desc: data.data.description || null };
    }
    return null;
  } catch(e) { return null; }
}

function handleSend() {
  const input = $('#chatInput');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const isUrl = looksLikeUrl(text);
  const dom = isUrl ? safeHostname(text) : '';
  const chosenCat = STATE.ui.chatCat === 'auto'
    ? (isUrl ? autoClassify(text) : fallbackCatId())
    : STATE.ui.chatCat;
  const chosenTags = (STATE.ui.chatCat !== 'auto' && STATE.ui.chatTags) ? [...STATE.ui.chatTags] : [];
  const link = {
    id: uid('l'),
    url: isUrl ? (text.startsWith('http') ? text : 'https://' + text) : '',
    title: isUrl ? dom : text,
    domain: isUrl ? dom : '',
    createdAt: Date.now(),
    categoryId: chosenCat, tagIds: chosenTags,
    isFavorite: false,

function openCatManage() { renderCatEditList(); openSheet('catManagePanel'); }

function addCategory() {

function renameCat(id, name) {

}
let _dragCatId = null;
function catDragStart(e) {
  _dragCatId = e.target.dataset.id;
  e.target.classList.add('dragging');
}
function catDragEnd(e) {
  e.target.classList.remove('dragging');
  $$('.cat-edit-row').forEach(el => el.classList.remove('drag-over'));
}
function catDragOver(e) {
  e.preventDefault();
  const row = e.target.closest('.cat-edit-row');
  if (row && row.dataset.id !== _dragCatId) row.classList.add('drag-over');
}
function catDrop(e) {
  e.preventDefault();
  const row = e.target.closest('.cat-edit-row');
  if (!row) return;
  const targetId = row.dataset.id;
  if (targetId === _dragCatId) return;
  const fromIdx = STATE.categories.findIndex(c => c.id === _dragCatId);
  const toIdx = STATE.categories.findIndex(c => c.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = STATE.categories.splice(fromIdx, 1);
  STATE.categories.splice(toIdx, 0, moved);
  saveState(); renderCatEditList(); renderCatBar(); renderChatTopics(); renderChatTags();
}
function deleteCat(id) {

  const count = STATE.links.filter(l => l.categoryId === id).length;
  if (!confirm(`"${c.name}" 카테고리를 삭제해요.\n소속 ${count}개는 "기타"로 이동됩니다. 계속?`)) return;

/* ── 태그 CRUD ── */
function openTagManage() { STATE.ui.tagScope = 'common'; STATE.ui.tagScopeCat = null; renderTagManage(); openSheet('tagManagePanel'); }
function openTagManageFor(catId) { STATE.ui.tagScope = 'category'; STATE.ui.tagScopeCat = catId; closeSheet('catManagePanel'); setTimeout(() => { renderTagManage(); openSheet('tagManagePanel'); }, 250); }
function switchTagScope(scope) {
  STATE.ui.tagScope = scope;
  if (scope === 'category' && !STATE.ui.tagScopeCat) STATE.ui.tagScopeCat = STATE.categories.find(c => !c.isFallback)?.id || null;
  renderTagManage();
}
function renderTagManage() {
  $$('.tag-scope-tab').forEach(t => t.classList.toggle('active', t.dataset.scope === STATE.ui.tagScope));
  const isCommon = STATE.ui.tagScope === 'common';
  const catSelBox = $('#tagCategorySelect');
  catSelBox.classList.toggle('hidden', isCommon);
  const hint = $('#tagScopeHint');
  if (isCommon) hint.innerHTML = '<strong>공통 태그</strong>는 모든 카테고리에서 꺼내 쓸 수 있어요.';
  else {
    hint.innerHTML = '<strong>개별 태그</strong>는 지정한 카테고리 안에서만 보여요.';
    const catId = STATE.ui.tagScopeCat;
    catSelBox.querySelector('.cat-selector').innerHTML = STATE.categories.map(c =>
      `<button class="cat-pick ${catId===c.id?'picked':''}" data-id="${c.id}" onclick="pickTagScopeCat('${c.id}')">${escapeHtml(c.name)}</button>`
    ).join('');
  }
  const list = $('#tagEditList');
  let tags = isCommon
    ? STATE.tags.filter(t => t.scope === 'common')
    : STATE.tags.filter(t => t.scope === 'category' && t.categoryId === STATE.ui.tagScopeCat);
  if (tags.length === 0) list.innerHTML = `<div class="tag-empty">아직 없어요. 아래에서 추가하세요.</div>`;
  else list.innerHTML = tags.map(t => `
    <span class="tag-edit-chip ${t.scope==='common'?'common':''}" draggable="true" data-id="${t.id}"
      ondragstart="tagDragStart(event)" ondragend="tagDragEnd(event)"
      ondragover="tagDragOver(event)" ondrop="tagDrop(event)">
      #${escapeHtml(t.name)}
      <button class="tag-edit-chip-del" onclick="deleteTag('${t.id}')" title="삭제">×</button>
    </span>
  `).join('');
}
function pickTagScopeCat(catId) { STATE.ui.tagScopeCat = catId; renderTagManage(); }
function addTag() {
  const input = $('#newTagInput'); const name = input.value.trim();
  if (!name) return;
  const isCommon = STATE.ui.tagScope === 'common';
  const scope = isCommon ? 'common' : 'category';
  const catId = isCommon ? null : STATE.ui.tagScopeCat;
  if (!isCommon && !catId) { showToast('카테고리를 먼저 선택하세요'); return; }
  if (STATE.tags.some(t => t.name === name && t.scope === scope && t.categoryId === catId)) { showToast('이미 있는 태그예요'); return; }
  STATE.tags.push({ id: uid('t'), name, scope, categoryId: catId });

function deleteTag(id) {
  const t = findTag(id); if (!t) return;
  if (!confirm(`#${t.name} 태그를 삭제해요.\n해당 태그를 쓰는 글에서도 제거됩니다.`)) return;
  STATE.tags = STATE.tags.filter(x => x.id !== id);
  STATE.links.forEach(l => { l.tagIds = l.tagIds.filter(x => x !== id); });
  if (STATE.filter.tagId === id) STATE.filter.tagId = null;
  saveState(); renderTagManage(); renderTagBar(); renderList();
}
let _dragTagId = null;
function tagDragStart(e) {
  const chip = e.target.closest('.tag-edit-chip');
  if (!chip) return;
  _dragTagId = chip.dataset.id;
  chip.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function tagDragEnd(e) {
  $$('.tag-edit-chip').forEach(el => el.classList.remove('dragging', 'drag-over'));
}
function tagDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const chip = e.target.closest('.tag-edit-chip');
  $$('.tag-edit-chip').forEach(el => el.classList.remove('drag-over'));
  if (chip && chip.dataset.id !== _dragTagId) chip.classList.add('drag-over');
}
function tagDrop(e) {
  e.preventDefault();
  const chip = e.target.closest('.tag-edit-chip');
  if (!chip) return;
  const targetId = chip.dataset.id;
  if (!targetId || targetId === _dragTagId) return;
  const fromIdx = STATE.tags.findIndex(t => t.id === _dragTagId);
  const toIdx = STATE.tags.findIndex(t => t.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = STATE.tags.splice(fromIdx, 1);
  STATE.tags.splice(toIdx, 0, moved);
  saveState(); renderTagManage(); renderTagBar();
  showToast('✓ 순서 변경됨');
}

/* ══════════════════════════════════
   리더 (iframe 기반)
   ══════════════════════════════════ */
let SNAPSHOT = null;
let isDirty = false;

function refreshSnapshot() {
  const link = findLink(STATE.currentLinkId);
  if (!link) { SNAPSHOT = null; return; }
  SNAPSHOT = {
    title: link.title,
    noteText: link.note?.text || '',
    content: link.content || ''
  };
  isDirty = false; updateSaveBtn();
}
function discardEdits() {
  if (!SNAPSHOT) return;
  const link = findLink(STATE.currentLinkId); if (!link) return;
  link.title = SNAPSHOT.title;
  if (link.note) link.note.text = SNAPSHOT.noteText;
  link.content = SNAPSHOT.content;
}
function markDirty() { if (!isDirty) { isDirty = true; updateSaveBtn(); } }
function updateSaveBtn() {
  const btn = $('#btnSave'); if (!btn) return;
  btn.classList.toggle('dirty', isDirty);
}
function saveDraft() {
  if (!STATE.currentLinkId) return;
  saveState(); refreshSnapshot(); renderList();
  showToast('✓ 저장됐어요');
}

function openReader(id) {
  const link = findLink(id); if (!link) return;
  STATE.currentLinkId = id;
  renderReader();
  refreshSnapshot();
  $('#reader').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeReader() {
  if (isDirty) {
    if (!confirm('저장되지 않은 변경사항이 있어요.\n뒤로 가시겠어요?')) return;
    discardEdits();
  }
  closeReaderForce();
}
function closeReaderForce() {
  $('#reader').classList.remove('open');
  document.body.style.overflow = '';
  SNAPSHOT = null; isDirty = false;
}

function renderReader() {
  const link = findLink(STATE.currentLinkId); if (!link) return;
  // 제목
  $('#readerTitle').textContent = link.title;
  $('#readerTitle').oninput = () => { link.title = $('#readerTitle').textContent.trim() || '제목 없음'; markDirty(); };
  // 메타
  const cat = findCat(link.categoryId);
  const tagStr = link.tagIds.map(tid => { const t = findTag(tid); return t ? `#${escapeHtml(t.name)}` : ''; }).filter(Boolean).join(' ');
  const catBadge = cat ? `<span class="link-cat-badge" style="background:${cat.color}22;color:${cat.color}">${escapeHtml(cat.name)}</span>` : '';
  const urlLink = link.url ? `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener">${escapeHtml(link.domain)}</a>` : `<span style="color:var(--terra);font-weight:600;">✍️ 내 글</span>`;
  $('#readerMeta').innerHTML = `${catBadge}<span class="sep">·</span>${urlLink}${tagStr?`<span class="sep">·</span>${tagStr}`:''}`;
  // 노트
  $('#noteText').value = link.note?.text || '';
  $('#noteCard').classList.toggle('collapsed', link.note?.collapsed === true);
  renderNoteImages();
  $('#noteText').oninput = () => { link.note.text = $('#noteText').value; markDirty(); };
  // 본문 영역: link.url이 있으면 preview card, 아니면 mywork 텍스트
  const previewArea = $('#previewArea');
  const myworkContent = $('#myworkContent');
  if (link.url) {
    previewArea.classList.remove('hidden');
    myworkContent.classList.add('hidden');
    // 카드 정보 채우기
    const dom = link.domain || safeHostname(link.url);
    const fullUrl = link.url.startsWith('http') ? link.url : 'https://' + link.url;
    $('#previewCard').href = fullUrl;
    $('#previewFavicon').src = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(dom)}&sz=128`;
    $('#previewFavicon').style.opacity = '1';
    $('#previewSource').textContent = dom.split('.').slice(-2)[0] || dom;
    $('#previewTitle').textContent = link.title;
    $('#previewUrl').textContent = link.url;
  } else {
    previewArea.classList.add('hidden');
    myworkContent.classList.remove('hidden');
    myworkContent.innerHTML = link.content || '';
    myworkContent.oninput = () => { link.content = myworkContent.innerHTML; markDirty(); };
  }
  renderReaderActions();
}
function renderReaderActions() {
  const link = findLink(STATE.currentLinkId); if (!link) return;
  $('#btnFav').classList.toggle('fav-on', link.isFavorite);
}

/* 노트 토글 & 이미지 */
function toggleNote() {
  const link = findLink(STATE.currentLinkId); if (!link) return;
  if (!link.note) link.note = { text:'', images:[], collapsed: false };
  link.note.collapsed = !link.note.collapsed;
  $('#noteCard').classList.toggle('collapsed', link.note.collapsed);
  saveState();
}
function renderNoteImages() {
  const link = findLink(STATE.currentLinkId); if (!link) return;
  const imgs = link.note?.images || [];
  $('#noteImgCount').textContent = imgs.length ? `· 이미지 ${imgs.length}` : '';
  $('#noteImages').innerHTML = imgs.map((src, i) => `
    <div class="note-img-wrap">
      <img src="${src}" alt="" />
      <button class="note-img-del" onclick="removeNoteImage(${i})" title="삭제">×</button>
    </div>
  `).join('');
}
function handleNoteImage(e) {
  const files = [...(e.target.files || [])];
  const link = findLink(STATE.currentLinkId); if (!link) return;
  if (!link.note) link.note = { text:'', images:[], collapsed:false };
  link.note.images = link.note.images || [];
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => { link.note.images.push(ev.target.result); saveState(); refreshSnapshot(); renderNoteImages(); };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function removeNoteImage(i) {
  const link = findLink(STATE.currentLinkId); if (!link) return;
  link.note.images.splice(i, 1); saveState(); refreshSnapshot(); renderNoteImages();
}

/* ── 시트 공통 ── */
function openSheet(id) { $('#'+id).classList.add('open'); }
function closeSheet(id) { $('#'+id).classList.remove('open'); }

/* ── 초기 ── */
function renderAll() {
  renderFavToggle();
  renderCatBar(); renderTagBar(); renderChatTopics(); renderChatTags(); renderList();
  const si = $('#searchInput');
  if (si) { si.value = STATE.filter.search || ''; $('#searchClear').classList.toggle('show', !!si.value); }
}
renderUserTabs();
renderAll();
if ($('#searchInput')) $('#searchInput').addEventListener('input', handleSearchInput);

// 자동 동기화: 병합 방식 (기존 유지 + 새 것만 추가)
(async function autoSync() {
  const sb = getSupabase();
  if (!sb) return;
  try {
    const { data } = await sb.from(SYNC.table || 'archive_profiles').select('data, updated_at').eq('id', ACTIVE_USER).single();
    if (data?.data) {
      const cloud = data.data;
      let added = 0;
      (cloud.categories || []).forEach(c => {
        if (!STATE.categories.find(x => x.id === c.id)) { STATE.categories.push(c); added++; }
      });
      (cloud.tags || []).forEach(t => {
        if (!STATE.tags.find(x => x.id === t.id)) { STATE.tags.push(t); added++; }
      });
      (cloud.links || []).forEach(l => {
        if (!STATE.links.find(x => x.id === l.id)) { STATE.links.push(l); added++; }
      });
      if (added > 0) {
        saveState();
        renderAll();
        showToast('☁️ +' + added + '개 동기화됨');
      }
    }
  } catch (e) { console.log('auto sync skip', e); }
})();
</script>
